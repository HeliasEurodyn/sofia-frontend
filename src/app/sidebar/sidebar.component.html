<div class="sidebar-wrapper">
  <div class="logo">
    <div class="logo-image-small"><img src="assets/img/angular2-logo.png"></div>
  </div>
  <ul class="nav">


    <li *ngFor="let menuItem of menuHeaders" routerLinkActive="active" class="header-menu">
      <a (click)="parentMenuUnselection(menuItem.id);">
        <i class="fa fa-sign-out header-menu"></i>
        <p>{{menuItem.title}}</p>
      </a>
    </li>

    <br *ngIf="menuHeaders?.length > 0 ">

    <li *ngFor="let menuItem of selectedMenuItems" routerLinkActive="active" class="{{menuItem.class}}">

      <a *ngIf="menuItem.type === 'link'" [routerLink]="[menuItem.path]">
        <i class="fa {{menuItem.icon}}"></i>
        <p>{{menuItem.title}}</p>
      </a>

      <a *ngIf="menuItem.type === 'parent-menu'" (click)="parentMenuSelection(menuItem.id);">
        <i class="parent-menu fa {{menuItem.icon}}"></i>
        <p>{{menuItem.title}}</p>
      </a>

    </li>
