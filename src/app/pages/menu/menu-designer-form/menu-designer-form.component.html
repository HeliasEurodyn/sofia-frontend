<div class="row">
  <div class="col-sm-12">
    <div class="pull-left">
      <button class="btn btn-outline-success" style="margin-top: 0px;" (click)="save()">
        <i class="fa fa-save"></i>
        Save
      </button>
      <button class="btn btn-outline-danger" style="margin-top: 0px;" [hidden]="mode === 'new-record'"
              (click)="delete()">
        <i class="fa fa-times"></i>
        Delete
      </button>
      <button class="btn btn-outline-primary" style="margin-top: 0px;" (click)="toList()">
        <i class="fa fa-sign-out"></i>
        Back
      </button>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <div class="card card-user">
      <div class="card-header">
        <h5 class="card-title">Menu</h5>
      </div>
      <div class="card-body">
        <form>
          <div class="row">
            <div class="col-md-12">
              <div class="form-group " [ngClass]="{'has-danger': tableExists}">
                <label>Name</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="menuComponent.name">
                <code></code>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <div class="card card-user">
      <div class="card-header">

        <div class="row">
          <div class="col-sm-7">
            <h5 class="card-title pull-left">Menu Item</h5>
          </div>
          <div class="col-sm-5">
            <div class="pull-right">
              <button class="btn btn-outline-primary" (click)="addLine()">
                <i class="fa fa-plus-circle"></i>
                New
              </button>
            </div>
          </div>
        </div>

      </div>
      <div class="card-body">
        <form>
          <div class="row">
            <div class="col-md-12">
              <div class="form-group " [ngClass]="{'has-danger': tableExists}">
                <label>Name</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="menuComponent.name">
                <code></code>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12">
              <div class="form-group " [ngClass]="{'has-danger': tableExists}">
                <label>Icon</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="menuComponent.name">
                <code></code>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12">
              <div class="form-group " [ngClass]="{'has-danger': tableExists}">
                <label>Command</label>
                <input type="text" class="form-control" name="name" [(ngModel)]="menuComponent.name">
                <code></code>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>


<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-header">
        <div class="row">
          <div class="col-sm-12">
            <h5 class="card-title pull-left">Menu Preview</h5>
          </div>

        </div>
      </div>
      <div class="card-body">
        <ul>
          <ng-template #recursiveList let-list>
            <li *ngFor="let item of list">
              <h6>
                <i _ngcontent-sbk-c113="" class="fa {{item.icon}}"></i>
                {{item.name}}
                <button _ngcontent-ymq-c111="" type="button" title="Edit"
                        class="btn btn-outline-success btn-icon btn-sm" tabindex="0"
                        ng-reflect-router-link="/table-designer-form/5">
                  <i _ngcontent-ymq-c111="" class="fa fa-pencil"></i>
                </button>
                <button _ngcontent-kca-c111="" type="button" title="Delete"
                        class="btn btn-outline-danger btn-icon btn-sm">
                  <i _ngcontent-kca-c111="" class="fa fa-times"></i>
                </button>
              </h6>
              <ul *ngIf="item.menuFieldList.length > 0">
                <ng-container
                  *ngTemplateOutlet="recursiveList; context:{ $implicit: item.menuFieldList }"></ng-container>
              </ul>
            </li>
          </ng-template>
          <ng-container
            *ngTemplateOutlet="recursiveList; context:{ $implicit: menuComponent.menuFieldList }"></ng-container>
        </ul>
      </div>


    </div>
  </div>
</div>
