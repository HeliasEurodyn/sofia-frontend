<div class="tab-content text-center" id="my-tab-content">
  <!-- filters -->
  <div aria-expanded="true" class="tab-pane active" id="columns" role="tabpanel">
    <div class="row">
      <div class="col-md-12">
        <div class="card card-user">
          <div class="card-header">
            <div class="row">
              <div class="col-sm-7">
                <h5 class="card-title pull-left">
                  <i class="fa fa-filter"></i>
                  Filters</h5>
              </div>
              <div class="col-sm-5">
                <div class="pull-right">
                  <!--                  <button class="btn btn-outline-primary">-->
                  <!--                    <i class="fa fa-search"></i> List-->
                  <!--                  </button>-->
                </div>
              </div>
            </div>
          </div>
          <div class="card-body">


            <div class="row">

              <ng-container *ngFor="let row of this.listComponentDto?.listComponentFilterFieldList">

                <ng-container *ngIf="row.type === 'varchar' || row.type === 'text' ">
                  <div class="{{row.bclass}}  L{{listDto.id}}-{{listComponentDto.code}}-{{row.code}} filter-col"
                       style="{{row.css}}">
                    <div class="form-group">
                      <b [ngClass]="{'text-danger': row.required}">{{row.description}}</b>
                      <input type="text" class="form-control" [(ngModel)]="row.fieldValue">
                    </div>
                  </div>
                </ng-container>

                <ng-container *ngIf="row.type === 'double' ">
                  <div class="{{row.bclass}} L{{listDto.id}}-{{listComponentDto.code}}-{{row.code}} filter-col"
                       style="{{row.css}}">
                    <div class="form-group">
                      <b [ngClass]="{'text-danger': row.required}" class="text-danger">{{row.description}}</b>
                      <input type="number" number="true" [(ngModel)]="row.fieldValue" class="form-control">
                    </div>
                  </div>
                </ng-container>

                <ng-container *ngIf="row.type === 'int' || row.type === 'bigint'">
                  <div class="{{row.bclass}} L{{listDto.id}}-{{listComponentDto.code}}-{{row.code}} filter-col"
                       style="{{row.css}}">
                    <div class="form-group">
                      <b [ngClass]="{'text-danger': row.required}">{{row.description}}</b>
                      <input type="number" number="true" [(ngModel)]="row.fieldValue" class="form-control">
                    </div>
                  </div>
                </ng-container>

                <ng-container *ngIf="row.type === 'datetime'">
                  <div class="{{row.bclass}} L{{listDto.id}}-{{listComponentDto.code}}-{{row.code}} filter-col"
                       style="{{row.css}}">
                    <div class="form-group">
                      <b [ngClass]="{'text-danger': row.required}">{{row.description}}</b>
                      <app-date-picker [(inputDate)]="row.fieldValue"></app-date-picker>
                    </div>
                  </div>
                </ng-container>

              </ng-container>

            </div>


          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- columns -->
  <div aria-expanded="false" class="tab-pane" id="filters" role="tabpanel">


    <div class="row">

      <div *ngIf="isGroupContentDivVisible()" class="col-md-2 col-sm-12 col-12">
        <div class="card">
          <div class="card-header">

            <div class="row">
              <div class="col-sm-7">
                <div class="numbers pull-left"></div>
              </div>
              <div class="col-sm-5">
              </div>
            </div>

          </div>
          <div class="card-body">

            <div *ngIf="groupContent?.length > 0" class="row">
              <div class="col-12">
                <h6 class="float-left"> Grouping columns </h6>
              </div>
            </div>
            <ul *ngIf="groupContent?.length > 0">
              <ng-template #recursiveList let-list>
                <li *ngFor="let item of list">

                  <div class="btn-group">
                    <button *ngIf="item['children'].length > 0" (click)="updateVisibility(item)" type="button"
                            class="btn left-group-button btn-outline-success active-header" style="padding: 5px;">
                      <i class="fa fa-expand"></i>
                    </button>
                    <button (click)="filterGroup(item)" class="btn left-group-button btn-outline-default">
                      {{item['value']}}
                    </button>
                  </div>
                  <ul *ngIf="item['children'] != undefined && item['childrenVisible'] ">
                    <ng-container
                      *ngTemplateOutlet="recursiveList; context:{ $implicit: item['children'] }">
                    </ng-container>
                  </ul>
                </li>
              </ng-template>
              <ng-container
                *ngTemplateOutlet="recursiveList; context:{ $implicit: groupContent}"></ng-container>
            </ul>


            <div class="row" style="margin-bottom: 1rem">
              <div class="col-12">
                <h6 class="float-left"> Grouping columns </h6>
              </div>
              <div class="col-12" *ngFor="let item of this.listComponentDto?.listComponentLeftGroupFieldList">
                <p class="float-left" style="margin-bottom: 0px;"><i class="fa fa-square"></i> {{item.description}} </p>
              </div>
            </div>


          </div>
        </div>
      </div>

      <div class="col">
        <div class="card">
          <div class="card-header">
            <div class="row">
              <div class="col-sm-7">
                <h5 class="card-title pull-left">
                  <i class="fa fa-search"></i>
                  List</h5>
              </div>
              <div class="col-sm-5">
                <div class="pull-right">
                  <button type="button" title="Excel" (click)="dataExcel()"
                          class="btn btn-outline-primary btn-icon btn-sm">
                    <i class="fa fa-file-excel-o"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card-body">


            <table class="table table-striped table-fixed">
              <thead class="text-primary">
              <tr>
                <ng-container *ngIf="this.listComponentDto?.listComponentActionFieldList.length > 0">
                  <th style="max-width: 100px;"></th>
                </ng-container>
                <ng-container *ngFor="let row of this.listComponentDto?.listComponentColumnFieldList">
                  <th *ngIf="row.visible" class="sortable">
                    {{row.description}}
                  </th>
                </ng-container>
              </tr>
              </thead>
              <tbody>

              <tr *ngFor="let row of this.listResultsData?.listContent">
                <!--              <td *ngFor="let cell of row">{{cell}}</td>-->


                <td style="max-width: 100px;" *ngIf="this.listComponentDto?.listComponentActionFieldList.length > 0">
                  <ng-container *ngFor="let field of this.listComponentDto?.listComponentActionFieldList">
                    <button type="button" title="{{field.description}}" (click)="listButtonClick(field.editor)"
                            class="btn btn-outline-success btn-icon btn-sm">
                      <i class="fa {{field.bclass}}"></i>
                    </button>
                  </ng-container>
                </td>


                <ng-container *ngFor="let column of this.listComponentDto?.listComponentColumnFieldList">
                  <td *ngIf="column.visible">
                    <input type="text" class="form-control transparent-input" readonly [(ngModel)]="row[column.code]">
                  </td>
                </ng-container>
              </tr>


              </tbody>
            </table>


            <!--            <div class="div-table">-->
            <!--              <div class="div-table-row">-->

            <!--                <div class="div-table-col">Mkkk</div>-->
            <!--              </div>-->

            <!--            </div>-->

          </div>


        </div>
      </div>
    </div>


  </div>
</div>
