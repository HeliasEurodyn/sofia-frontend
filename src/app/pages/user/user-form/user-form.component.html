<div class="row">
  <div class="col-sm-12">
    <div class="pull-left">
      <button class="btn btn-outline-success" style="margin-top: 0px;" (click)="save()">
        <i class="fa fa-save"></i>
        Save
      </button>
      <button class="btn btn-outline-danger" style="margin-top: 0px;" [hidden]="mode === 'new-record'"
              (click)="delete()">
        <i class="fa fa-times"></i>
        Delete
      </button>
      <button class="btn btn-outline-primary" style="margin-top: 0px;" *ngIf="showPreviousPageButton()"
              (click)="navigateToPreviousPage()">
        <i class="fa fa-chevron-left"></i> Back
      </button>
      <button class="btn btn-outline-primary" style="margin-top: 0px;" *ngIf="showNextPageButton()"
              (click)="navigateToNextPage()">
        <i class="fa fa-chevron-right"></i> Next
      </button>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <div class="card card-user">
      <div class="card-header">
        <h5 class="card-title">User details</h5>
      </div>
      <div class="card-body">

        <div class="row">
          <div class="col-md-12">
            <div class="form-group">
              <label>Username</label>
              <input type="text" class="form-control" name="username" [(ngModel)]="userDTO.username">
              <code></code>
            </div>
          </div>

          <div class="col-md-12">
            <div class="form-group">
              <label>Email</label>
              <input type="text" class="form-control" name="email" [(ngModel)]="userDTO.email">
              <code></code>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group">
              <label>Password</label>
              <input type="text" class="form-control" name="password" [(ngModel)]="userDTO.password">
              <code></code>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-group">
              <label>Repeat Password</label>
              <input type="text" class="form-control" name="repeatPassword" [(ngModel)]="userDTO.repeatPassword">
              <code></code>
            </div>
          </div>

          <div class="col-md-12">
            <div class="form-group">
              <label>Status</label>
              <input type="text" class="form-control" name="status" [(ngModel)]="userDTO.status">
              <code></code>
            </div>
          </div>

          <div class="col-md-12">
            <div class="form-group">
              <label>Date Format</label>
              <input type="text" class="form-control" name="dateFormat" [(ngModel)]="userDTO.dateFormat">
              <code></code>
            </div>
          </div>

<div aria-labelledby="ModalLabel" class="modal fade" id="insertMenuModal" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header justify-content-center">
        <h4 class="title title-up modal-title">Insert Menu</h4>
        <button aria-label="Close" class="close" data-dismiss="modal" type="button"><i
          class="nc-icon nc-simple-remove"></i></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="row">
            <div class="col-12">
              <table class="table table-striped">
                <thead class=" text-primary">
                <tr>
                  <th>id</th>
                  <th>name</th>
                </tr>
                </thead>
                <tbody>
                <tr *ngFor="let menu of menuDTOS" (click)="selectMenu(menu)" data-dismiss="modal"
                    style="cursor: pointer;">
                  <td>
                    <input type="text" readonly class="form-control transparent-input"
                           value="{{menu['id']}}">
                  </td>
                  <td>
                    <input type="text" readonly class="form-control transparent-input"
                           value="{{menu['name']}}">
                  </td>
                </tr>

                </tbody>
              </table>
            </div>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <div class="left-side">
          <button class="btn btn-outline-danger" data-dismiss="modal" type="button">Close</button>
        </div>

      </div>
    </div>
  </div>
</div>
