<div class="row">
  <div class="col-sm-12">
    <div class="pull-left">
      <button class="btn btn-outline-success" style="margin-top: 0px;" (click)="save()">
        <i class="fa fa-save"></i>
        Save
      </button>
      <button class="btn btn-outline-danger" style="margin-top: 0px;" [hidden]="mode === 'new-record'"
              (click)="delete()">
        <i class="fa fa-times"></i>
        Delete
      </button>
      <button class="btn btn-outline-primary" style="margin-top: 0px;" *ngIf="showPreviousPageButton()" (click)="navigateToPreviousPage()">
        <i class="fa fa-chevron-left"></i> Back
      </button>
      <button class="btn btn-outline-primary" style="margin-top: 0px;" *ngIf="showNextPageButton()" (click)="navigateToNextPage()">
        <i class="fa fa-chevron-right"></i> Next
      </button>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <div class="card card-user">
      <div class="card-header">
        <h5 class="card-title">User details</h5>
      </div>
      <div class="card-body">

          <div class="row">
            <div class="col-md-12">
              <div class="form-group">
                <label>Username</label>
                <input type="text" class="form-control" name="username" [(ngModel)]="userDTO.username">
                <code></code>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label>Email</label>
                <input type="text" class="form-control" name="email" [(ngModel)]="userDTO.email">
                <code></code>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Password</label>
                <input type="text" class="form-control" name="password" [(ngModel)]="userDTO.password">
                <code></code>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Repeat Password</label>
                <input type="text" class="form-control" name="repeatPassword" [(ngModel)]="userDTO.repeatPassword">
                <code></code>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label>Status</label>
                <input type="text" class="form-control" name="status" [(ngModel)]="userDTO.status">
                <code></code>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label>Date Format</label>
                <input type="text" class="form-control" name="dateFormat" [(ngModel)]="userDTO.dateFormat">
                <code></code>
              </div>
            </div>

            <div class="col-md-12">
              <div class="form-group">
                <label>Menu</label>
                <select [(ngModel)]="userDTO.menu.id"  class="form-control" data-size="7" data-style="btn btn-primary btn-round" title="Single Select" >
                  <option class="bs-title-option" value="{{null}}">-</option>
                  <option *ngFor="let menuDto of menuDTOS" class="bs-title-option" value="{{menuDto.id}}">{{menuDto.id}} - {{menuDto.name}}</option>
                </select>

                <code></code>
              </div>
            </div>






          </div>

      </div>
    </div>
  </div>
</div>
