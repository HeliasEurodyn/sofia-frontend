<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-header">

        <div class="row">
          <div class="col-sm-7">
            <div class="numbers pull-left"> Table Designer </div>
          </div>
          <div class="col-sm-5">
            <div class="pull-right">
              <button class="btn btn-outline-success" (click)="openNewPage()" >
                <i class="fa fa-plus-circle"></i> New
              </button>
            </div>
            <div class="pull-right">
              <button class="btn btn-outline-primary" (click)="refresh()" >
                <i class="fa fa-refresh"></i> Refresh
              </button>
              <button class="btn btn-outline-primary" (click)="showNotification()" >
                <i class="fa fa-refresh"></i> Popup example
              </button>


            </div>


          </div>
        </div>

      </div>
      <div class="card-body">
        <div class="">
          <table class="table table-striped">
            <thead class=" text-primary">
            <tr>
              <th class="text-left">Actions</th>
              <th>id</th>
              <th>name</th>
              <th>version</th>
            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let row of tableData.dataRows">
              <td>
               <button type="button" title="Edit" class="btn btn-outline-success btn-icon btn-sm"
                        (click)="openPage( row['id'])"   >
                  <i class="fa fa-pencil"></i>
               </button>
                <button type="button" title="Delete" class="btn btn-outline-danger btn-icon btn-sm" (click)="delete(row)">
                  <i class="fa fa-times"></i>
                </button>
                <button type="button" title="Clone" class="btn btn-outline-success btn-icon btn-sm"
                        (click)="clone( row['id'])"   >
                  <i class="fa fa-clone"></i>
                </button>
              </td>
              <td>
                <input type="text" class="form-control transparent-input" readonly [(ngModel)]="row['id']">
              </td>
              <td>
                <input type="text" class="form-control transparent-input" readonly [(ngModel)]="row['name']">
              </td>
              <td>
                <input type="text" class="form-control transparent-input" readonly [(ngModel)]="row['createdOn']">
              </td>


            </tr>

            </tbody>
          </table>
        </div>
      </div>


    </div>
  </div>
</div>
