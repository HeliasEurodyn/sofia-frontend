<div class="wrapper wrapper-full-page background">
  <div class="full-page section-image" filter-color="black">
    <div class="content">
      <div class="container">
        <div class="col-lg-4 col-md-6 ml-auto mr-auto">
          <div class="card card-login">
            <div class="card-header ">
              <div class="card-header ">
                <h3 class="header text-center"><img src="assets/img/angular2-logo.png"></h3>
              </div>
            </div>
            <div class="card-body ">
              <div class="input-group">
                <div class="input-group-prepend"><span class="input-group-text"><i
                  class="nc-icon nc-single-02"></i></span></div>
                <input class="form-control" placeholder="Username" name="username" type="text" [(ngModel)]="username"
                       (keyup.enter)="onEnterMethod()">
              </div>
              <div class="input-group">
                <div class="input-group-prepend"><span class="input-group-text">
                    <i class="nc-icon nc-key-25"></i></span>
                </div>
                <input class="form-control" placeholder="Password" name="password" [(ngModel)]="password"
                       type="password">
              </div>
              <br>
              <div class="form-group">
                <div class="form-check"><label class="form-check-label">
                  <input [(ngModel)]="rememberChecked" name="rememberChecked" class="form-check-input" type="checkbox">
                  <span class="form-check-sign"></span> Remember me </label></div>
              </div>
            </div>
            <div class="card-footer ">

              <a class="btn btn-outline-success btn-block mb-3" href="javascript:void(0)" (click)="authenticateUser()">
                <i class="fa fa-sign-in"> </i>
                Login
              </a>
            </div>
          </div>
        </div>
